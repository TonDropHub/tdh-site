name: TDH Patch Layout

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

# Needed so the workflow can push the patched HTML back to the repo
permissions:
  contents: write

# Prevent overlapping runs of this workflow on the same branch
concurrency:
  group: tdh-patch-layout-${{ github.ref }}
  cancel-in-progress: true

jobs:
  patch:
    # Avoid committing in a loop (the second run is skipped)
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Apply patch (inject theme snippet + /assets/site.js into all HTML)
        run: python3 TDH_patch_apply_global_layout.py

      - name: Commit if changed
        id: commit_changes
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: apply global layout/theme"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync with latest main
        if: steps.commit_changes.outputs.changed == 'true'
        shell: bash
        run: |
          git fetch origin main
          git rebase origin/main

      - name: Push changes with retry
        if: steps.commit_changes.outputs.changed == 'true'
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi

            echo "Push failed on attempt $attempt. Refreshing branch and retrying..."
            git fetch origin main
            git rebase origin/main
            sleep 2
          done

          echo "Push failed after 3 attempts"
          exit 1
